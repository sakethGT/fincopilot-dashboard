name: Daily Market Data Fetch

on:
  schedule:
    - cron: '0 2 * * 2-6'   # 9PM ET (2AM UTC), Tue-Sat (covers Mon-Fri market days)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch market data
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: python fetch_market.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Analysis/Market/
          git diff --staged --quiet || git commit -m "chore: daily market data $(date +%Y-%m-%d)"
          git push
